name: shellcheck

# Lints the shell scripts. Signal-only for now (does not block merges) — it surfaces
# quoting / set -u / portability issues early. task.sh is sourced (functions, no shebang),
# so it carries a `# shellcheck shell=bash` directive at its top.
on:
  push:
    paths:
      - 'shell/**'
      - 'install.sh'
      - 'update.sh'
      - 'uninstall.sh'
      - '.github/workflows/shellcheck.yml'
  pull_request:
    paths:
      - 'shell/**'
      - 'install.sh'
      - 'update.sh'
      - 'uninstall.sh'
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck --version
          shellcheck -S warning shell/task.sh install.sh update.sh uninstall.sh
